<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al-Khidmat Vocabulary</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:10px;
}
h1{
    text-align:center;
    color:#22c55e;
}
.footer{
    text-align:center;
    margin-top:30px;
    color:#38bdf8;
}

/* Section */
.section{margin-top:20px;}
.section h2{
    background:#1e293b;
    padding:10px;
    border-radius:10px;
    color:#facc15;
}

/* Word */
.word{
    background:#020617;
    margin:6px 0;
    padding:12px;
    border-radius:10px;
    border:1px solid #334155;
    cursor:pointer;
    transition:0.2s;
}
.word:active{
    transform:scale(0.95);
    background:#38bdf8;
    color:black;
}

.english{font-weight:bold;}
.pashto{color:#22c55e;font-size:14px;}
</style>
</head>

<body>

<h1>📘 Al-Khidmat Educational Center</h1>

<div id="app"></div>

<div class="footer">✨ Created by Qudus Zarifi</div>

<script>

// ===== RENDER =====
const app=document.getElementById("app");

sections.forEach(sec=>{
    let div=document.createElement("div");
    div.className="section";

    let html=`<h2>${sec.title}</h2>`;

    sec.words.forEach(w=>{
        html+=`
        <div class="word" onclick="speak('${w[0]}')">
            <div class="english">${w[0]}</div>
            <div class="pashto">${w[1]}</div>
        </div>`;
    });

    div.innerHTML=html;
    app.appendChild(div);
});

// ===== VOICE =====
function speak(text){
    let s=new SpeechSynthesisUtterance(text);
    s.lang="en-US";
    s.rate=0.9;
    speechSynthesis.speak(s);
}

</script>

</body>
</html>
